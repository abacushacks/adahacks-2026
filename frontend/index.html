{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Tracking</title>
    <!-- External Libraries -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Video & Canvas Elements -->
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    
    <!-- Containers -->
    <div id="popups-container"></div>
    
    <!-- Controls Overlay -->
    <div id="controls">
        <label for="holdTime">Hold Time (ms): </label>
        <input type="number" id="holdTime" value="1500" step="100">
        <div id="gateStatus">
            Audio Gate: <span id="gateIndicator">CLOSED</span>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="{% static 'js/audio-manager.js' %}"></script>
    <script src="{% static 'js/face-tracker.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
